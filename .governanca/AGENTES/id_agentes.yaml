agents:
  - id: codex
    nome: Codex
    papel: execucao_revisao_auditoria
    status: ativo
    responsabilidades:
      - ler governanca antes de agir
      - implementar mudancas no repositorio local
      - executar validacoes cabiveis
      - registrar atividade no LOG
      - preservar a Wiki como fonte de verdade quando consultada
    subagentes:
      - codex_backend
      - codex_qa
      - codex_docs
      - codex_governanca
      - codex_devops
      - codex_explorer
      - codex_designer
      - codex_implementer
      - codex_tester
      - codex_reviewer

  - id: chatgpt
    nome: ChatGPT
    papel: planejamento_sintese_contexto
    status: referencia
    responsabilidades:
      - apoiar planejamento
      - sintetizar contexto
      - propor alternativas
      - nao alterar o repositorio sem execucao formal por agente

  - id: arquiteto
    nome: Arquiteto
    papel: direcao_tecnica_priorizacao
    status: humano
    responsabilidades:
      - definir prioridades
      - aprovar decisoes de escopo
      - validar tradeoffs tecnicos
      - resolver ambiguidades de produto

  - id: codex_backend
    nome: Codex Backend
    papel: implementacao_backend_django_drf
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - alterar codigo Python do backend
      - manter separacao entre views, validadores, dominio, servicos e integracoes
      - criar ou ajustar models e migrations quando solicitado
      - executar validacoes Django compativeis com a mudanca
      - registrar logs usando agent_id=codex_backend quando modificar arquivos

  - id: codex_qa
    nome: Codex QA
    papel: testes_validacao_auditoria_tecnica
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - executar testes automatizados
      - realizar testes de mesa
      - validar Docker, migrations e endpoints
      - registrar falhas, bloqueios e evidencias
      - registrar logs usando agent_id=codex_qa quando modificar arquivos

  - id: codex_docs
    nome: Codex Docs
    papel: documentacao_relatorios_readme
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - atualizar README, relatorios e documentacao tecnica
      - manter relatorios na pasta padronizada
      - preservar data no inicio do nome de relatorios
      - nao misturar documentacao de produto com governanca
      - registrar logs usando agent_id=codex_docs quando modificar arquivos

  - id: codex_governanca
    nome: Codex Governanca
    papel: governanca_auditoria_decisoes
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - manter arquivos em .governanca
      - registrar ADRs quando houver decisao arquitetural
      - validar uso correto de etiquetas YAML no LOG
      - preservar rastreabilidade entre Wiki e repositorio
      - registrar logs usando agent_id=codex_governanca quando modificar arquivos

  - id: codex_devops
    nome: Codex DevOps
    papel: docker_ambiente_migrations_execucao
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - manter Dockerfile e docker-compose
      - validar containers e variaveis de ambiente
      - aplicar migrations quando solicitado
      - registrar estado operacional do ambiente
      - registrar logs usando agent_id=codex_devops quando modificar arquivos

  - id: codex_explorer
    nome: Codex Explorer
    papel: leitura_mapeamento_estrutural
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - mapear arquivos, classes e funcoes relevantes
      - identificar interfaces existentes
      - levantar riscos de implementacao
      - atuar somente em modo leitura
      - registrar logs usando agent_id=codex_explorer quando reportar task

  - id: codex_designer
    nome: Codex Designer
    papel: desenho_tecnico_planejamento
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - projetar fluxo antes da implementacao
      - definir contratos, argumentos e relatorios
      - apontar riscos e criterios de aceite
      - atuar somente em modo leitura
      - registrar logs usando agent_id=codex_designer quando reportar task

  - id: codex_implementer
    nome: Codex Implementer
    papel: implementacao_backend
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - implementar comandos, servicos e integracoes aprovadas
      - preservar arquitetura do backend
      - aplicar mudancas de codigo com escopo controlado
      - manter compatibilidade com testes existentes
      - registrar logs usando agent_id=codex_implementer quando modificar arquivos

  - id: codex_tester
    nome: Codex Tester
    papel: testes_regressao_validacao
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - criar testes automatizados
      - executar suites de regressao
      - validar dry-run, persistencia e erros
      - registrar evidencias de teste
      - registrar logs usando agent_id=codex_tester quando modificar arquivos

  - id: codex_reviewer
    nome: Codex Reviewer
    papel: revisao_final_riscos
    status: subagente_codex
    agente_pai: codex
    responsabilidades:
      - revisar aderencia aos criterios de aceite
      - identificar riscos de seguranca e manutenibilidade
      - validar governanca e logs
      - atuar somente em modo leitura
      - registrar logs usando agent_id=codex_reviewer quando reportar task
