services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_pass
      POSTGRES_DB: atlas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atlas_network

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgres://atlas_user:atlas_pass@db:5432/atlas_db
      ATLAS_API_KEY: atlas-mvp-2026
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
    depends_on:
      - db
    networks:
      - atlas_network

volumes:
  postgres_data:

networks:
  atlas_network:
